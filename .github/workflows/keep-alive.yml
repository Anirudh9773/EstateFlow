name: Keep Supabase Alive

on:
  schedule:
    # Run every 3 days at 00:00 UTC to prevent the 7-day inactivity pause
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Error: SUPABASE_URL or SUPABASE_ANON_KEY secret is not set in GitHub repository secrets."
            exit 1
          fi
          
          echo "Pinging Supabase REST API..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          
          echo "Response code: $STATUS_CODE"
          if [ "$STATUS_CODE" -eq 200 ] || [ "$STATUS_CODE" -eq 401 ] || [ "$STATUS_CODE" -eq 404 ]; then
            echo "Successfully pinged Supabase (status: $STATUS_CODE). Activity registered!"
          else
            echo "Ping failed with unexpected status: $STATUS_CODE"
            exit 1
          fi
